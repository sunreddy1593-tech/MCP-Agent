# Example run configuration for a weekly pulse run.
# Copy/edit for your product. Secrets (GROQ_API_KEY) live in .env, not here.

product_id: "com.nextbillion.groww"
product_name: "Groww"

window:
  # Reviews from the last N weeks (allowed range: 8-12).
  weeks: 12

themes:
  # At most 5 themes. Data-derived for Groww (see Phase 3 in implementation-plan.md).
  labels:
    - charges_fees
    - trading_products
    - app_ux_updates
    - customer_support
    - withdrawals_payments

sources:
  # Download settings for `review-pulse download`.
  # Set explicit ids, or leave null and pass --query "App Name" to resolve them.
  app_store:
    app_id: null        # App Store skipped (no id, no query) — Play Store only
    country: "in"
  play_store:
    app_id: "com.nextbillion.groww"   # Groww package name
    lang: "en"
    country: "in"
  # Safety cap; the 12-week window is the real bound. Raise if you hit the cap.
  max_reviews: 20000

outputs:
  doc_title: "Groww — Weekly Review Pulse"
  # The Workspace MCP server APPENDS to an existing Doc (it cannot create one).
  # Create a Doc once, then set its id (or full URL) here so each week appends a
  # new dated section. Leave null to skip Doc delivery (artifact-only fallback).
  doc_id: null
  # Recipient of the Gmail draft (yourself or an alias). Draft only, never sent.
  email_to: "me@example.com"

# Google Workspace MCP server connection (Phase 6). Non-secret only; the URL,
# auth token, and stdio command are supplied via env (MCP_WORKSPACE_*). Leaving
# this out runs stages 1-5 and keeps the pulse locally (status "pending").
mcp:
  transport: "http"          # "http" (streamable HTTP) or "stdio"
  server_label: "google-workspace"
  max_retries: 3

groq:
  model: "llama-3.3-70b-versatile"
  temperature: 0.2

# Local directories.
exports_dir: "data/exports"
store_dir: "store/runs"
